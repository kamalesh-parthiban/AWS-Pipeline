version: 0.2

env:
  variables:
    AWS_REGION: "us-east-2"
    ECR_REPO_NAME: "pipeline"
    EKS_CLUSTER_NAME: "my-eks-cluster"
    K8S_NAMESPACE: "default"
    AWS_ACCOUNT_ID: "382458445256"

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo "Installing kubectl..."
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
      - echo "kubectl installed ✅"

  pre_build:
    commands:
      - echo "Logging in to ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - ECR_REGISTRY=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - echo "Image tag is $IMAGE_TAG"
      - aws ecr describe-repositories --repository-names $ECR_REPO_NAME --region $AWS_REGION || aws ecr create-repository --repository-name $ECR_REPO_NAME --region $AWS_REGION

  build:
    commands:
      - echo "Building JAR..."
      - mvn clean package -DskipTests
      - echo "Running tests..."
      - mvn test
      - echo "Building Docker image..."
      - docker build -t $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG .
      - docker tag $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_NAME:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG
      - docker push $ECR_REGISTRY/$ECR_REPO_NAME:latest
      - echo "Updating Deployment.yaml..."
      - sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG|g" Deployment.yaml
      - echo "Build complete ✅"
      # REMOVED kubectl apply from here
      # CodeDeploy will handle deployment

artifacts:
  files:
    - target/myapp.jar
    - Deployment.yaml
    - appspec.yml          ← added
    - scripts/deploy.sh    ← added
  discard-paths: no

reports:
  surefire_reports:
    files:
      - target/surefire-reports/*.xml
    file-format: JUNITXML
